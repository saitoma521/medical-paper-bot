search:
  days_back: 7
  max_results: 200
  top_n: 10
  detailed_top_n: 10
study_type_scores:
  Randomized Controlled Trial: 10
  Meta-Analysis: 9
  Systematic Review: 9
  Clinical Trial: 8
  Multicenter Study: 7
  Observational Study: 6
  Cohort Study: 6
  Practice Guideline: 10
  Guideline: 10
  Review: 4
  Case Reports: 1
  Editorial: 2
  Comment: 1
  Letter: 1
exclude_types:
- Case Reports
- Editorial
- Comment
- Letter
- Published Erratum
clinical_relevance:
  high_value:
  - pain relief
  - functional outcome
  - return to sport
  - quality of life
  - reoperation rate
  - complication rate
  - patient satisfaction
  - cartilage degeneration
  - progression to osteoarthritis
  - hip survivorship
  practical:
  - treatment algorithm
  - clinical decision making
  - surgical technique
  - rehabilitation protocol
  - diagnostic imaging
  - patient selection
  - outcome measure
  - cost effectiveness
  japan_relevant:
